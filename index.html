<!DOCTYPE html>
<html lang="ja">
<head>
  <link rel="apple-touch-icon" href="icon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CASIO F-91W - Clock.exe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Press+Start+2P&family=DSEG7+Classic:ital,wght@0,100;0,300;0,400;0,700;1,100;1,300;1,400;1,700&display=swap" rel="stylesheet">
  <style>
    body {
      background: #008080; /* Teal desktop */
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'DotGothic16', sans-serif;
    }

    /* Window Container */
    .window {
      width: calc(100% - 24px);
      max-width: 360px;
      background: #C0C0C0;
      border: 2px solid #000;
      box-shadow: 4px 4px 0 #000; /* Original sharp corner, black hard shadow */
      display: flex;
      flex-direction: column;
    }

    /* Title Bar */
    .title-bar {
      background: #0000A8; /* Navy */
      color: #fff;
      padding: 4px 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #000;
      font-weight: bold;
      font-size: 14px;
    }
    .title-bar-text {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .title-bar-icon {
      width: 16px;
      height: 16px;
      background: #fff;
      border: 1px solid #000;
      display: inline-block;
      box-shadow: inset 1px 1px 0 rgba(0,0,0,0.5);
    }

    .btn-close {
      background: #C0C0C0;
      border: 2px solid #000;
      box-shadow: 1px 1px 0 #000;
      color: #000;
      font-family: 'DotGothic16', sans-serif;
      font-weight: bold;
      cursor: pointer;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      line-height: 1;
    }
    .btn-close:active {
      box-shadow: inset 1px 1px 0 #000;
      transform: translate(1px, 1px);
    }

    /* Window Content */
    .window-content {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* LCD Screen */
    .lcd {
      background: #8fa882;
      border: 2px solid #000;
      box-shadow: inset 4px 4px 0 rgba(0,0,0,0.3);
      padding: 12px;
      position: relative;
    }
    .lcd.light-on {
      background: #c8e87a;
    }

    /* Brand Header inside LCD */
    .lcd-brand {
      display: flex;
      justify-content: space-between;
      border-bottom: 2px dashed rgba(0,0,0,0.2);
      padding-bottom: 4px;
      margin-bottom: 8px;
    }
    .brand-casio {
      font-family: 'Press Start 2P', cursive;
      font-size: 8px;
      color: #000;
    }
    .brand-model {
      font-family: 'DotGothic16', sans-serif;
      font-size: 12px;
      font-weight: bold;
      color: #000;
    }

    /* LCD Layout */
    .lcd-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      height: 24px;
      margin-bottom: 4px;
    }

    .lcd-indicator {
      font-size: 10px;
      color: #3a4a35;
      display: flex;
      flex-direction: column;
      line-height: 1;
      font-weight: bold;
    }

    .lcd-day-date {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .day-label {
      font-family: 'Press Start 2P', cursive;
      font-size: 8px;
      color: #000;
    }

    .seg-small {
      font-family: 'DSEG7 Classic', monospace;
      font-size: 16px;
      color: #1a2a15;
    }

    .lap-group {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }
    .lap-label {
      font-family: 'Press Start 2P', cursive;
      font-size: 6px;
      color: #000;
      margin-bottom: 2px;
    }

    .lcd-main {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 2px;
      padding-top: 4px;
    }

    .seg-large {
      font-family: 'DSEG7 Classic', monospace;
      font-size: 48px;
      color: #1a2a15;
      line-height: 1;
    }

    .seg-colon {
      font-family: 'DSEG7 Classic', monospace;
      font-size: 40px;
      color: #1a2a15;
      line-height: 1;
      animation: blink 1s step-end infinite;
      position: relative;
      top: -4px;
    }

    .seg-seconds {
      font-family: 'DSEG7 Classic', monospace;
      font-size: 24px;
      color: #1a2a15;
      margin-left: 4px;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    .blink { animation: blink 0.8s step-end infinite; }

    .mode-label {
      text-align: center;
      font-family: 'Press Start 2P', cursive;
      font-size: 8px;
      color: #000;
      margin-top: 12px;
      height: 8px;
    }

    .alarm-indicator {
      position: absolute;
      top: 12px;
      right: 12px;
      font-family: 'Press Start 2P', cursive;
      font-size: 8px;
      color: #1a2a15;
      display: none;
    }
    .alarm-indicator.active { display: block; }

    /* Button Controls */
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .btn {
      border: 2px solid #000;
      background: #C0C0C0;
      padding: 8px;
      cursor: pointer;
      box-shadow: 2px 2px 0 #000;
      font-family: 'Press Start 2P', cursive;
      font-size: 10px;
      color: #000;
      text-align: center;
      user-select: none;
    }
    .btn:active {
      box-shadow: inset 2px 2px 0 rgba(0,0,0,0.5);
      transform: translate(2px, 2px);
    }
  </style>
</head>
<body>

<div class="window">
  <!-- Title Bar -->
  <div class="title-bar">
    <div class="title-bar-text">
      <div class="title-bar-icon"></div>
      CASIO F-91W - Clock.exe
    </div>
    <button class="btn-close">X</button>
  </div>

  <!-- Content -->
  <div class="window-content">
    
    <!-- LCD Screen -->
    <div class="lcd" id="lcd">
      <div class="lcd-brand">
        <span class="brand-casio">CASIO</span>
        <span class="brand-model">F-91W</span>
      </div>

      <div class="lcd-top">
        <div class="lcd-indicator">
          <span id="ind-pm">PM</span>
          <span style="font-size:8px;">24H</span>
        </div>
        <div class="lcd-day-date">
          <span class="day-label" id="day-label">MON</span>
          <span class="seg-small" id="date-display">20</span>
        </div>
        <div class="lap-group">
          <span class="lap-label" id="lap-label">MO</span>
          <span class="seg-small" id="top-right">00</span>
        </div>
      </div>

      <div class="lcd-main" id="main-display">
        <span class="seg-large" id="main-h">12</span>
        <span class="seg-colon" id="colon">:</span>
        <span class="seg-large" id="main-m">00</span>
        <span class="seg-seconds" id="main-s">00</span>
      </div>

      <div class="mode-label" id="mode-label"></div>
      <div class="alarm-indicator" id="alarm-ind">ALM</div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="btn" onclick="pressLight()">LIGHT</button>
      <button class="btn" onclick="pressStart()">START/STOP</button>
      <button class="btn" onclick="pressMode()">MODE</button>
      <button class="btn" onclick="pressLap()">LAP/RESET</button>
    </div>

  </div>
</div>

<script>
const MODES = ['TIME', 'STOPWATCH', 'ALARM', 'WORLD TIME'];
let currentMode = 0;

const CITIES = [
  { code: 'TYO', offset: 9 },
  { code: 'NYC', offset: -5 },
  { code: 'LON', offset: 0 },
  { code: 'PAR', offset: 1 },
  { code: 'SYD', offset: 10 }
];
let currentCityIndex = 0;

let lightTimer = null;

let swRunning = false;
let swStartTime = 0;
let swElapsed = 0;
let swLapTime = null;
let swInterval = null;

let alarmEnabled = false;
let alarmHour = 7;
let alarmMinute = 0;
let alarmEditing = 0; // 0=hour, 1=minute
let alarmFired = false;

const lcd       = document.getElementById('lcd');
const mainH     = document.getElementById('main-h');
const mainM     = document.getElementById('main-m');
const mainS     = document.getElementById('main-s');
const colon     = document.getElementById('colon');
const dayLabel  = document.getElementById('day-label');
const datedisp  = document.getElementById('date-display');
const topRight  = document.getElementById('top-right');
const lapLabel  = document.getElementById('lap-label');
const modeLabel = document.getElementById('mode-label');
const alarmInd  = document.getElementById('alarm-ind');
const indPm     = document.getElementById('ind-pm');

const DAYS = ['SUN','MON','TUE','WED','THU','FRI','SAT'];

function pad(n, w=2) { return String(n).padStart(w, '0'); }

function updateTime() {
  const now = new Date();
  let h = now.getHours();
  const m = now.getMinutes();
  const s = now.getSeconds();
  const isPm = h >= 12;
  const h12 = h % 12 || 12;

  indPm.style.color = isPm ? '#1a2a15' : '#8a9a85';
  dayLabel.textContent = DAYS[now.getDay()];
  datedisp.textContent = pad(now.getDate());
  topRight.textContent = pad(now.getMonth() + 1);
  lapLabel.textContent = 'MO';

  mainH.textContent = pad(h12);
  mainM.textContent = pad(m);
  mainS.textContent = pad(s);
}

function checkAlarmTrigger(h, m) {
  if (alarmEnabled && !alarmFired) {
    if (h === alarmHour && m === alarmMinute) {
      triggerAlarm();
    }
  }
  if (alarmFired && (h !== alarmHour || m !== alarmMinute)) {
    alarmFired = false;
  }
}

function updateStopwatch() {
  const elapsed = swRunning ? swElapsed + (Date.now() - swStartTime) : swElapsed;
  const displayTime = swLapTime !== null ? swLapTime : elapsed;

  const totalMs  = Math.floor(displayTime);
  const ms  = Math.floor((totalMs % 1000) / 10);
  const sec = Math.floor(totalMs / 1000) % 60;
  const min = Math.floor(totalMs / 60000) % 100;

  mainH.textContent = pad(min);
  mainM.textContent = pad(sec);
  mainS.textContent = pad(ms);

  lapLabel.textContent = swLapTime !== null ? 'LAP' : '';
}

function updateAlarmDisplay() {
  const h12 = alarmHour % 12 || 12;
  const isPm = alarmHour >= 12;

  indPm.style.color = isPm ? '#1a2a15' : '#8a9a85';
  dayLabel.textContent = 'ALM';
  datedisp.textContent = '--';
  topRight.textContent = '--';
  lapLabel.textContent = '';

  mainH.textContent = pad(h12);
  mainM.textContent = pad(alarmMinute);
  mainS.textContent = alarmEnabled ? 'ON' : 'OF';

  if (alarmEditing === 0) {
    mainH.classList.add('blink');
    mainM.classList.remove('blink');
  } else {
    mainH.classList.remove('blink');
    mainM.classList.add('blink');
  }
}

function updateWorldTimeDisplay() {
  const now = new Date();
  const city = CITIES[currentCityIndex];
  const localDate = new Date(now.getTime() + (3600000 * city.offset));

  let h = localDate.getUTCHours();
  const m = localDate.getUTCMinutes();
  const s = localDate.getUTCSeconds();
  const isPm = h >= 12;
  const h12 = h % 12 || 12;

  indPm.style.color = isPm ? '#1a2a15' : '#8a9a85';
  dayLabel.textContent = city.code;
  datedisp.textContent = pad(localDate.getUTCDate());
  topRight.textContent = pad(localDate.getUTCMonth() + 1);
  lapLabel.textContent = '';

  mainH.textContent = pad(h12);
  mainM.textContent = pad(m);
  mainS.textContent = pad(s);
}

function pressLight() {
  lcd.classList.add('light-on');
  if (lightTimer) clearTimeout(lightTimer);
  lightTimer = setTimeout(() => lcd.classList.remove('light-on'), 2000);
}

function pressMode() {
  if (currentMode === 2) {
    mainH.classList.remove('blink');
    mainM.classList.remove('blink');
    alarmEditing = 0;
  }

  currentMode = (currentMode + 1) % MODES.length;

  if (currentMode === 0) {
    modeLabel.textContent = '';
    colon.style.animation = 'blink 1s step-end infinite';
    stopStopwatch();
    swLapTime = null;
    swElapsed = 0;
    alarmInd.className = 'alarm-indicator' + (alarmEnabled ? ' active' : '');
    lapLabel.textContent = 'MO';
  } else if (currentMode === 1) {
    modeLabel.textContent = 'STOPWATCH';
    colon.style.animation = 'none';
    colon.style.opacity = '1';
    alarmInd.className = 'alarm-indicator' + (alarmEnabled ? ' active' : '');
    topRight.textContent = '00';
    lapLabel.textContent = '';
    updateStopwatch();
  } else if (currentMode === 2) {
    modeLabel.textContent = 'ALARM SET';
    colon.style.animation = 'none';
    colon.style.opacity = '1';
    updateAlarmDisplay();
  } else if (currentMode === 3) {
    modeLabel.textContent = 'WORLD TIME';
    colon.style.animation = 'blink 1s step-end infinite';
    updateWorldTimeDisplay();
  }
}

function pressStart() {
  if (currentMode === 1) {
    if (swRunning) {
      swElapsed += Date.now() - swStartTime;
      swRunning = false;
      clearInterval(swInterval);
    } else {
      swStartTime = Date.now();
      swRunning = true;
      swLapTime = null;
      swInterval = setInterval(updateStopwatch, 50);
    }
  } else if (currentMode === 2) {
    alarmEditing = alarmEditing === 0 ? 1 : 0;
    updateAlarmDisplay();
  } else if (currentMode === 3) {
    currentCityIndex = (currentCityIndex + 1) % CITIES.length;
    updateWorldTimeDisplay();
  }
}

function pressLap() {
  if (currentMode === 1) {
    if (swRunning) {
      const elapsed = swElapsed + (Date.now() - swStartTime);
      swLapTime = elapsed;
    } else {
      swElapsed = 0;
      swLapTime = null;
      swStartTime = 0;
      mainH.textContent = '00';
      mainM.textContent = '00';
      mainS.textContent = '00';
    }
  } else if (currentMode === 2) {
    if (alarmEditing === 0) {
      alarmHour = (alarmHour + 1) % 24;
    } else {
      alarmMinute = (alarmMinute + 1) % 60;
    }
    updateAlarmDisplay();
  } else if (currentMode === 0) {
    alarmEnabled = !alarmEnabled;
    alarmInd.className = 'alarm-indicator' + (alarmEnabled ? ' active' : '');
  } else if (currentMode === 3) {
    currentCityIndex = (currentCityIndex - 1 + CITIES.length) % CITIES.length;
    updateWorldTimeDisplay();
  }
}

function stopStopwatch() {
  if (swRunning) {
    swElapsed += Date.now() - swStartTime;
    swRunning = false;
  }
  clearInterval(swInterval);
}

function triggerAlarm() {
  alarmFired = true;
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  let count = 0;
  function beep() {
    if (count >= 8) return;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = 2000;
    osc.type = 'square';
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.15);
    count++;
    setTimeout(beep, 300);
  }
  beep();
  let blinks = 0;
  const blinkInterval = setInterval(() => {
    lcd.classList.toggle('light-on');
    if (++blinks >= 16) {
      clearInterval(blinkInterval);
      lcd.classList.remove('light-on');
    }
  }, 150);
}

function tick() {
  const now = new Date();
  checkAlarmTrigger(now.getHours(), now.getMinutes());

  if (currentMode === 0) {
    updateTime();
  } else if (currentMode === 2) {
    updateAlarmDisplay();
  } else if (currentMode === 3) {
    updateWorldTimeDisplay();
  }
}

setInterval(tick, 1000);
updateTime();
</script>
</body>
</html>
